name: Deploy Web

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy to Vercel production
        required: false
        default: main
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: main
  workflow_run:
    workflows:
      - Full Validation
    types:
      - completed
    branches:
      - main

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel Production
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deploy ref
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.ref }}" ]]; then
            echo "ref=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy public download page
        uses: ./.github/actions/deploy-vercel
        with:
          ref: ${{ steps.meta.outputs.ref }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-deploy-hook-url: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
