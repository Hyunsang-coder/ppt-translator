name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Create a DRAFT release up front so every matrix build can attach its
  # installers, updater bundles, signatures and the latest.json manifest to the
  # same release. It is published (un-drafted) only after all builds succeed.
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.result }}
      tag: ${{ steps.release-meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release-meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="v${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify release version matches tauri.conf.json
        shell: bash
        run: |
          TAG="${{ steps.release-meta.outputs.tag }}"
          VERSION="${TAG#v}"
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [[ "$VERSION" != "$TAURI_VERSION" ]]; then
            echo "Release tag version ($VERSION) does not match src-tauri/tauri.conf.json ($TAURI_VERSION)." >&2
            exit 1
          fi

      - name: Create draft release
        id: create_release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.release-meta.outputs.tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const notes = [
              'Desktop installers for PPT 번역캣.',
              '',
              'macOS builds are notarized when signing secrets are configured;',
              'Windows builds are not code-signed yet and can show a SmartScreen warning.',
            ].join('\n');
            // Reuse an existing release for this tag if present, else create one.
            let release;
            try {
              release = (await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })).data;
            } catch (e) {
              release = (await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `PPT 번역캣 ${tag}`,
                body: notes,
                draft: true,
                prerelease: false,
              })).data;
            }
            return release.id;

  build:
    name: Build ${{ matrix.label }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            bundles: dmg
            asset_name: ppt-translator-macos-arm64.dmg
            asset_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - label: macOS Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
            asset_name: ppt-translator-macos-x64.dmg
            asset_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - label: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            asset_name: ppt-translator-windows-x64-setup.exe
            asset_glob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe

    env:
      CI: "true"
      TAURI_BUILD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ignore local-only Cargo config
        shell: bash
        run: rm -f src-tauri/.cargo/config.toml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: desktop/requirements-desktop.txt

      - name: Install sidecar dependencies
        shell: bash
        run: |
          python -m venv desktop/.venv-desktop
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PYTHON="desktop/.venv-desktop/Scripts/python.exe"
          else
            PYTHON="desktop/.venv-desktop/bin/python"
          fi
          "$PYTHON" -m pip install --upgrade pip
          "$PYTHON" -m pip install -r desktop/requirements-desktop.txt

      - name: Setup Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      # Build the Python sidecar and the Next.js frontend BEFORE tauri-action.
      # tauri-action then runs `tauri build` with beforeBuildCommand no-op'd via
      # tauri-ci.conf.json, so it just packages the already-staged artifacts.
      - name: Build sidecar and frontend
        shell: bash
        run: |
          node ./desktop/ensure-sidecar.mjs --force
          cd frontend
          npm run build

      # Launch the staged sidecar and assert it actually boots. Catches runtime
      # crashes (e.g. Unix-only imports on Windows) that compile/package fine but
      # fail on the user's machine — the exact class of bug that shipped in 0.1.3.
      - name: Smoke-test sidecar
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            EXE="src-tauri/resources/sidecar/ppt-translator-sidecar.exe"
          else
            EXE="src-tauri/resources/sidecar/ppt-translator-sidecar"
          fi
          echo "Launching $EXE"
          "$EXE" > sidecar.log 2>&1 &
          PID=$!
          ok=0
          for _ in $(seq 1 30); do
            if grep -q "SIDECAR_READY" sidecar.log 2>/dev/null; then ok=1; break; fi
            if ! kill -0 "$PID" 2>/dev/null; then break; fi  # process died early
            sleep 1
          done
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true
          echo "----- sidecar.log -----"
          cat sidecar.log || true
          if [[ "$ok" != "1" ]]; then
            echo "error: sidecar never reported SIDECAR_READY (startup crash?)" >&2
            exit 1
          fi
          echo "Sidecar startup OK"

      # Sign the PyInstaller sidecar's nested native libs with Developer ID.
      # Tauri only signs the main .app (no --deep), so anything under
      # bundle.resources reaches notarization with PyInstaller's ad-hoc signature
      # and Apple rejects it ("not signed with a valid Developer ID certificate" +
      # "no secure timestamp"). We sign every Mach-O here, innermost-first, in our
      # own keychain; Tauri's later signing (separate keychain, no --deep) leaves
      # these intact. macOS-only; no-ops when the signing cert is absent.
      - name: Sign sidecar native libraries (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          [ -n "${APPLE_CERTIFICATE:-}" ] || { echo "No signing cert; skipping sidecar signing."; exit 0; }

          SIDECAR_DIR="src-tauri/resources/sidecar"
          ENTITLEMENTS="src-tauri/entitlements.plist"
          KEYCHAIN="$RUNNER_TEMP/sidecar-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"

          # Create + unlock an ephemeral keychain and import the .p12.
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -k "$KEYCHAIN" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Make the identity discoverable to codesign -s.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

          security find-identity -v -p codesigning "$KEYCHAIN"

          sign() {
            codesign --force --timestamp --options runtime \
              --entitlements "$ENTITLEMENTS" \
              -s "$APPLE_SIGNING_IDENTITY" --keychain "$KEYCHAIN" "$1"
          }

          # PyInstaller leaves some _internal entries (the loose root dylibs and
          # Python.framework/Python) as SYMLINKS pointing at build-machine ABSOLUTE
          # paths (e.g. .../PIL/.dylibs/libpng16.16.dylib). The codesign loop below
          # uses `find -type f`, so it skips symlinks — those roots reach Tauri
          # unsigned, Tauri dereferences them into the .app, and notarization rejects
          # the unsigned copies ("not signed with a valid Developer ID" + "no secure
          # timestamp"). Fix: replace every symlink with a real copy of its target so
          # the loop signs an actual file. The literal target is dead on CI (different
          # absolute path), so fall back to locating the real file by basename inside
          # the sidecar tree (basenames are unique here — verified one match each).
          find "$SIDECAR_DIR" -type l | while IFS= read -r link; do
            tgt="$(readlink "$link")"
            case "$tgt" in
              /*) real="$tgt" ;;
              *)  real="$(dirname "$link")/$tgt" ;;
            esac
            if [ ! -e "$real" ]; then
              # Build-machine absolute path is gone on CI: find the real file by name.
              real="$(find "$SIDECAR_DIR" -name "$(basename "$link")" -type f -print -quit)"
            fi
            if [ -n "$real" ] && [ -e "$real" ]; then
              echo "deref: $link -> $real"
              rm -f "$link"
              cp -p "$real" "$link"
            else
              echo "error: cannot resolve symlink target: $link -> $tgt" >&2
              exit 1
            fi
          done

          # PyInstaller bundles loose .dylib/.so, extension-less Mach-O executables
          # (e.g. _internal/Python), and a NON-standard Python.framework whose root
          # holds real files instead of symlinks — codesign refuses to seal it as a
          # bundle ("unsealed contents present in the root of an embedded framework").
          # So we don't treat frameworks as bundles: we sign EVERY individual Mach-O
          # file (in or out of a framework) by content, deepest-path first so nested
          # code is sealed before its container. All embedded code must carry a
          # Developer ID + secure timestamp or notarization rejects it.
          find "$SIDECAR_DIR" -type f -print0 \
            | while IFS= read -r -d '' f; do
                if file -b "$f" | grep -q 'Mach-O'; then echo "$f"; fi
              done | sort -r | while IFS= read -r macho; do
                echo "signing: $macho"
                sign "$macho"
              done

          # Fail closed: every Mach-O under the sidecar must verify (none ad-hoc).
          bad=0
          while IFS= read -r -d '' f; do
            if file -b "$f" | grep -q 'Mach-O'; then
              if ! codesign --verify --strict "$f" 2>/dev/null; then
                echo "UNSIGNED/INVALID: $f" >&2; bad=1
              fi
            fi
          done < <(find "$SIDECAR_DIR" -type f -print0)
          if [ "$bad" != 0 ]; then
            echo "error: some sidecar Mach-O files are not properly signed" >&2; exit 1
          fi
          codesign --verify --strict --verbose=2 "$SIDECAR_DIR/ppt-translator-sidecar"
          echo "Sidecar native code signed with Developer ID."

      # Build + sign + bundle (incl. updater artifacts) and upload everything to
      # the draft release. Signing the updater bundle requires the Tauri keypair;
      # macOS notarization requires the APPLE_* secrets (skipped if unset).
      - name: Build and sign installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: src-tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --config ../.github/tauri-ci.conf.json --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # tauri-action uploads the installer under its product-name filename
      # (e.g. "PPT 번역캣_0.1.6_aarch64.dmg"). The web download page links to
      # stable names at releases/latest/download/, so upload a renamed copy too.
      - name: Upload stable-named installer
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          shopt -s nullglob
          matches=( ${{ matrix.asset_glob }} )
          if [[ "${#matches[@]}" -ne 1 ]]; then
            printf 'Expected one installer matching %s, found %s\n' "${{ matrix.asset_glob }}" "${#matches[@]}" >&2
            printf '%s\n' "${matches[@]}" >&2
            exit 1
          fi
          cp "${matches[0]}" "${{ matrix.asset_name }}"
          gh release upload "$TAG" "${{ matrix.asset_name }}" --clobber

  publish:
    name: Publish GitHub Release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Un-draft release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
              prerelease: false,
              make_latest: 'true',
            });

  deploy-web:
    name: Deploy Web Download Page
    needs: publish
    uses: ./.github/workflows/deploy-web.yml
    secrets: inherit
    with:
      ref: main
