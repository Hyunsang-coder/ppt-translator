name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Create a DRAFT release up front so every matrix build can attach its
  # installers, updater bundles, signatures and the latest.json manifest to the
  # same release. It is published (un-drafted) only after all builds succeed.
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.result }}
      tag: ${{ steps.release-meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release-meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="v${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify release version matches tauri.conf.json
        shell: bash
        run: |
          TAG="${{ steps.release-meta.outputs.tag }}"
          VERSION="${TAG#v}"
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [[ "$VERSION" != "$TAURI_VERSION" ]]; then
            echo "Release tag version ($VERSION) does not match src-tauri/tauri.conf.json ($TAURI_VERSION)." >&2
            exit 1
          fi

      - name: Create draft release
        id: create_release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.release-meta.outputs.tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const notes = [
              'Desktop installers for PPT 번역캣.',
              '',
              'macOS builds are notarized when signing secrets are configured;',
              'Windows builds are not code-signed yet and can show a SmartScreen warning.',
            ].join('\n');
            // Reuse an existing release for this tag if present, else create one.
            let release;
            try {
              release = (await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })).data;
            } catch (e) {
              release = (await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `PPT 번역캣 ${tag}`,
                body: notes,
                draft: true,
                prerelease: false,
              })).data;
            }
            return release.id;

  build:
    name: Build ${{ matrix.label }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds dmg (user download) AND app (the updater-enabled target):
          # the 'app' bundle yields *.app.tar.gz + .sig, which tauri-action turns
          # into the macOS entry of latest.json. asset_glob is the dmg we re-upload
          # under a stable name for the web download page.
          - label: macOS Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            bundles: dmg,app
            asset_name: ppt-translator-macos-arm64.dmg
            asset_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - label: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            asset_name: ppt-translator-windows-x64-setup.exe
            asset_glob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe

    env:
      CI: "true"
      TAURI_BUILD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ignore local-only Cargo config
        shell: bash
        run: rm -f src-tauri/.cargo/config.toml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: desktop/requirements-desktop.txt

      - name: Install sidecar dependencies
        shell: bash
        run: |
          python -m venv desktop/.venv-desktop
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PYTHON="desktop/.venv-desktop/Scripts/python.exe"
          else
            PYTHON="desktop/.venv-desktop/bin/python"
          fi
          "$PYTHON" -m pip install --upgrade pip
          "$PYTHON" -m pip install -r desktop/requirements-desktop.txt

      - name: Setup Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      # Import the Developer ID cert into an ephemeral keychain BEFORE building the
      # sidecar, so PyInstaller can sign every collected binary + Python.framework
      # itself during the build (codesign_identity in sidecar.spec reads
      # APPLE_SIGNING_IDENTITY). PyInstaller signs in the correct order with the
      # framework file placement Apple requires — hand-signing the staged tree
      # afterwards cannot seal the framework's root binary slot. macOS-only;
      # no-ops without the cert (PyInstaller then ad-hoc signs, as before).
      - name: Set up signing keychain (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          [ -n "${APPLE_CERTIFICATE:-}" ] || { echo "No signing cert; PyInstaller will ad-hoc sign."; exit 0; }

          KEYCHAIN="$RUNNER_TEMP/sidecar-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -k "$KEYCHAIN" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Put our keychain first on the search list so codesign -s finds the cert.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      # Build the Python sidecar and the Next.js frontend BEFORE tauri-action.
      # tauri-action then runs `tauri build` with beforeBuildCommand no-op'd via
      # tauri-ci.conf.json, so it just packages the already-staged artifacts.
      # APPLE_SIGNING_IDENTITY makes PyInstaller sign the sidecar during the build.
      - name: Build sidecar and frontend
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          node ./desktop/ensure-sidecar.mjs --force
          cd frontend
          npm run build

      # Launch the staged sidecar and assert it actually boots. Catches runtime
      # crashes (e.g. Unix-only imports on Windows) that compile/package fine but
      # fail on the user's machine — the exact class of bug that shipped in 0.1.3.
      - name: Smoke-test sidecar
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            EXE="src-tauri/resources/sidecar/ppt-translator-sidecar.exe"
          else
            EXE="src-tauri/resources/sidecar/ppt-translator-sidecar"
          fi
          echo "Launching $EXE"
          "$EXE" > sidecar.log 2>&1 &
          PID=$!
          ok=0
          for _ in $(seq 1 30); do
            if grep -q "SIDECAR_READY" sidecar.log 2>/dev/null; then ok=1; break; fi
            if ! kill -0 "$PID" 2>/dev/null; then break; fi  # process died early
            sleep 1
          done
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true
          echo "----- sidecar.log -----"
          cat sidecar.log || true
          if [[ "$ok" != "1" ]]; then
            echo "error: sidecar never reported SIDECAR_READY (startup crash?)" >&2
            exit 1
          fi
          echo "Sidecar startup OK"

      # Verify the sidecar PyInstaller signed during the build (codesign_identity
      # in sidecar.spec) and repair any Mach-O it left ad-hoc / unverified. In
      # practice PyInstaller signs almost everything, but the framework's inner
      # main binary (Python.framework/Versions/3.12/Python) can come out unverified;
      # we re-sign exactly those stragglers with our Developer ID. This file is NOT
      # at the framework-root slot, so individual signing is valid here (the root
      # slot Python.framework/Python stays a symlink, which is correct).
      # macOS-only; skipped without the signing cert (then it's ad-hoc by design).
      - name: Verify sidecar signing (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          [ -n "${APPLE_CERTIFICATE:-}" ] || { echo "No signing cert; sidecar is ad-hoc by design."; exit 0; }
          SIDECAR_DIR="src-tauri/resources/sidecar"
          ENTITLEMENTS="src-tauri/entitlements.plist"
          KEYCHAIN="$RUNNER_TEMP/sidecar-signing.keychain-db"

          echo "::group::Python.framework tree"
          find "$SIDECAR_DIR/_internal/Python.framework" 2>/dev/null \
            | sed "s#$SIDECAR_DIR/_internal/##" | sort || echo "(no Python.framework)"
          echo "::endgroup::"

          resign() {
            codesign --force --timestamp --options runtime \
              --entitlements "$ENTITLEMENTS" \
              -s "$APPLE_SIGNING_IDENTITY" --keychain "$KEYCHAIN" "$1"
          }

          # First pass: repair any Mach-O that isn't validly Developer ID signed.
          # Deepest-path first so nested code is sealed before any container.
          find "$SIDECAR_DIR" -type f -print0 \
            | while IFS= read -r -d '' f; do
                file -b "$f" | grep -q 'Mach-O' && echo "$f"
              done | sort -r | while IFS= read -r macho; do
                if ! codesign --verify --strict "$macho" 2>/dev/null \
                   || ! codesign -dvv "$macho" 2>&1 | grep -q 'TeamIdentifier=[A-Z0-9]'; then
                  echo "repair-sign: $macho"
                  echo "  before:"; codesign -dvv "$macho" 2>&1 | grep -iE 'Signature|TeamId' | sed 's/^/    /' || true
                  resign "$macho"
                fi
              done

          # Second pass: fail closed. Every Mach-O must now verify AND carry a Dev ID.
          bad=0
          while IFS= read -r -d '' f; do
            if file -b "$f" | grep -q 'Mach-O'; then
              if ! codesign --verify --strict "$f" 2>/dev/null; then
                echo "UNVERIFIED: $f" >&2; bad=1
              elif ! codesign -dvv "$f" 2>&1 | grep -q 'TeamIdentifier=[A-Z0-9]'; then
                echo "AD-HOC (no Developer ID): $f" >&2; bad=1
              fi
            fi
          done < <(find "$SIDECAR_DIR" -type f -print0)
          if [ "$bad" != 0 ]; then
            echo "error: some sidecar Mach-O files are not Developer ID signed" >&2; exit 1
          fi
          codesign --verify --strict --verbose=2 "$SIDECAR_DIR/ppt-translator-sidecar"
          echo "Sidecar verified: all Mach-O Developer ID signed."

      # Build + sign + bundle (incl. updater artifacts) and upload everything to
      # the draft release. Signing the updater bundle requires the Tauri keypair;
      # macOS notarization requires the APPLE_* secrets (skipped if unset).
      - name: Build and sign installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: src-tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # productName is now ASCII ("ppt-translation-cat"), so tauri-action's asset
          # names are well-formed and it generates + uploads latest.json itself (the
          # Korean name used to mangle to "PPT._..." and break its updater-JSON step).
          args: --config ../.github/tauri-ci.conf.json --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # tauri-action uploads the installer under its product-name filename
      # (e.g. "ppt-translation-cat_0.1.6_aarch64.dmg"). The web download page links
      # to stable names at releases/latest/download/, so upload a renamed copy too.
      # latest.json + updater bundles are handled by tauri-action; we only restable
      # the user-facing installer here.
      - name: Upload stable-named installer
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          shopt -s nullglob
          matches=( ${{ matrix.asset_glob }} )
          if [[ "${#matches[@]}" -ne 1 ]]; then
            printf 'Expected one installer matching %s, found %s\n' "${{ matrix.asset_glob }}" "${#matches[@]}" >&2
            printf '%s\n' "${matches[@]}" >&2
            exit 1
          fi
          cp "${matches[0]}" "${{ matrix.asset_name }}"
          gh release upload "$TAG" "${{ matrix.asset_name }}" --clobber

  publish:
    name: Publish GitHub Release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Un-draft release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
              prerelease: false,
              make_latest: 'true',
            });

  deploy-web:
    name: Deploy Web Download Page
    needs: publish
    uses: ./.github/workflows/deploy-web.yml
    secrets: inherit
    with:
      ref: main
