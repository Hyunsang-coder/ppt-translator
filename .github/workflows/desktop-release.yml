name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            bundle: dmg
            asset_name: ppt-translator-macos-arm64.dmg
            asset_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - label: macOS Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            bundle: dmg
            asset_name: ppt-translator-macos-x64.dmg
            asset_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - label: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
            asset_name: ppt-translator-windows-x64-setup.exe
            asset_glob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe

    env:
      CI: "true"
      TAURI_BUILD: "1"
      CARGO_TARGET_DIR: target

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ignore local-only Cargo config
        shell: bash
        run: rm -f src-tauri/.cargo/config.toml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: desktop/requirements-desktop.txt

      - name: Install sidecar dependencies
        shell: bash
        run: |
          python -m venv desktop/.venv-desktop
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PYTHON="desktop/.venv-desktop/Scripts/python.exe"
          else
            PYTHON="desktop/.venv-desktop/bin/python"
          fi
          "$PYTHON" -m pip install --upgrade pip
          "$PYTHON" -m pip install -r desktop/requirements-desktop.txt

      - name: Setup Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Install Tauri CLI
        run: npm install --global @tauri-apps/cli@^2

      - name: Build sidecar and frontend
        shell: bash
        run: |
          node ./desktop/ensure-sidecar.mjs --force
          cd frontend
          npm run build

      # Launch the staged sidecar and assert it actually boots. Catches runtime
      # crashes (e.g. Unix-only imports on Windows) that compile/package fine but
      # fail on the user's machine — the exact class of bug that shipped in 0.1.3.
      - name: Smoke-test sidecar
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            EXE="src-tauri/resources/sidecar/ppt-translator-sidecar.exe"
          else
            EXE="src-tauri/resources/sidecar/ppt-translator-sidecar"
          fi
          echo "Launching $EXE"
          "$EXE" > sidecar.log 2>&1 &
          PID=$!
          ok=0
          for _ in $(seq 1 30); do
            if grep -q "SIDECAR_READY" sidecar.log 2>/dev/null; then ok=1; break; fi
            if ! kill -0 "$PID" 2>/dev/null; then break; fi  # process died early
            sleep 1
          done
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true
          echo "----- sidecar.log -----"
          cat sidecar.log || true
          if [[ "$ok" != "1" ]]; then
            echo "error: sidecar never reported SIDECAR_READY (startup crash?)" >&2
            exit 1
          fi
          echo "Sidecar startup OK"

      - name: Build installer
        shell: bash
        working-directory: src-tauri
        run: tauri build --config ../.github/tauri-ci.conf.json --target "${{ matrix.target }}" --bundles "${{ matrix.bundle }}"

      - name: Collect installer
        shell: bash
        run: |
          mkdir -p release-assets
          shopt -s nullglob
          matches=( ${{ matrix.asset_glob }} )
          if [[ "${#matches[@]}" -ne 1 ]]; then
            printf 'Expected one installer matching %s, found %s\n' "${{ matrix.asset_glob }}" "${#matches[@]}" >&2
            printf '%s\n' "${matches[@]}" >&2
            exit 1
          fi
          cp "${matches[0]}" "release-assets/${{ matrix.asset_name }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release-assets/${{ matrix.asset_name }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    outputs:
      tag: ${{ steps.release-meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release-meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="v${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify release version matches tauri.conf.json
        shell: bash
        run: |
          TAG="${{ steps.release-meta.outputs.tag }}"
          VERSION="${TAG#v}"
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [[ "$VERSION" != "$TAURI_VERSION" ]]; then
            echo "Release tag version ($VERSION) does not match src-tauri/tauri.conf.json ($TAURI_VERSION)." >&2
            exit 1
          fi

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release-meta.outputs.tag }}"

          NOTES=$(cat <<'EOF'
          Unsigned desktop installers for PPT 번역캣.

          macOS builds are not notarized yet and can show a Gatekeeper warning.
          Windows builds are not code-signed yet and can show a SmartScreen warning.
          EOF
          )

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "PPT 번역캣 $TAG" \
              --notes "$NOTES" \
              --latest
          fi

          gh release upload "$TAG" release-assets/* --clobber

  notify-vercel:
    name: Refresh Vercel Download Page
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [[ -z "$VERCEL_DEPLOY_HOOK_URL" ]]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not configured; skipping deploy hook."
            exit 0
          fi

          echo "Triggering Vercel redeploy for ${{ needs.publish.outputs.tag }}..."
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel redeploy requested."

      - name: Trigger Deploy Web workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy-web.yml --ref "$GITHUB_SHA"
          echo "Deploy Web workflow dispatched."
