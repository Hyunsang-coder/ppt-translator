# Local Rust build settings for managed macOS environments where Defender/DLP
# blocks the linker from reading files under /var/folders.
#
# Keeping both the Rust target dir and TMPDIR under the Defender-excluded
# location lets plain `cargo tauri dev` work without a wrapper script.
[build]
target-dir = "/Users/joo/_NOAV/XcodeDerivedData/cargo-target"

[env]
TMPDIR = { value = "/Users/joo/_NOAV/XcodeDerivedData/tmp", force = true }
